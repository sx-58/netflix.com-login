<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <header class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" 
             alt="Netflix" class="logo">
    </header>

    <main class="main-content">
        <h1 class="title">Informe seus dados para entrar</h1>
        
        <p class="subtitle">
            Ou <a href="#" class="link-white">crie uma conta</a>.
        </p>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <input type="text" id="email" name="email" required
                       placeholder="Email ou número de celular" 
                       class="input-field">
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" required
                       placeholder="Senha" 
                       class="input-field">
            </div>

            <button type="submit" id="submitBtn" class="btn-netflix">
                Continuar
            </button>
        </form>

        <div class="help-section">
            <button class="help-btn">
                <span>Ajuda</span>
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
        </div>

        <p class="recaptcha-text">
            Esta página é protegida pelo Google reCAPTCHA para garantir que você não é um robô. 
            <a href="#" class="link-white">Saiba mais</a>
        </p>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p class="footer-text">
                Dúvidas? Ligue para 
                <a href="tel:08005918943" class="footer-link">0800 591 8943</a> 
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
